# Submit from repository root:
#   gcloud builds submit --config=nextbase-api/cloudbuild.yaml .
# Build context is `nextbase-api/` so Dockerfile COPY paths match Cloud Run --source .
steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "nextbase-api/Dockerfile"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nextbase-api"
      - "nextbase-api"
images:
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nextbase-api"
