        var isTravelRedirect = u.searchParams.get('travel') === '1';
        var current = parseBillingState();
        glbTraceExpiry('prime:start', {
            sid: !!sid,
            isTravelRedirect: isTravelRedirect,
            currentPlan: current && current.plan ? current.plan : null,
            currentExp: current && current.travelPass ? Number(current.travelPass.expiresAt || 0) : 0
        });
        if (sid && isTravelRedirect) {
            if (!(current && current.active === true && current.plan)) {
                var startedAt = Date.now();
                persistBillingState({
                    plan: PLAN_TRAVEL_1499_30D,
                    active: true,
                    source: 'stripe_success',
                    travelPass: {
                        enabled: true,
                        startedAt: startedAt,
                        expiresAt: startedAt + MS_30D,
                        expired: false,
                        timeSource: 'local_pending_sync'
                    }
                });
                glbTraceExpiry('prime:write_travel', { startedAt: startedAt });
            } else {
                glbTraceExpiry('prime:skip_existing_state', {
                    plan: current.plan,
                    exp: current.travelPass ? Number(current.travelPass.expiresAt || 0) : 0
                });
            }
        } else if (sid) {
            if (!(current && current.active === true)) {
                persistBillingState({ plan: PLAN_CORE_299, active: true, source: 'stripe_success', updatedAt: Date.now() });
            }
        } else if (subq === '1' || subq === 'true') {
            if (!(current && current.active === true)) {
                persistBillingState({ plan: PLAN_CORE_299, active: true, source: 'url_subscribed', updatedAt: Date.now() });
            }
        }
    } catch (e) { /* ignore */ }
})();

(function guardTravelRequiresActiveTravelPass() {
    try {
        var u = new URL(window.location.href);
        if ((u.searchParams.get('nori') || '') === 'admin') return;
        var before = parseBillingState();
        glbTraceExpiry('guard:before_expire_check', {
            plan: before && before.plan ? before.plan : null,
            active: !!(before && before.active === true),
            exp: before && before.travelPass ? Number(before.travelPass.expiresAt || 0) : 0,
            now: Date.now()
        });
        if (expireTravelPassIfNeeded()) {
            try { sessionStorage.setItem('GLB_FORCE_CORE_AFTER_TRAVEL_EXPIRE', '1'); } catch (e0) { /* ignore */ }
            forceRedirectToCore('travel_expired');
            return;
        }
        if (!glbCorePaidActive()) {
            window.location.replace(new URL('index.html', window.location.href).href);
            return;
        }
        if (!isTravelPassActive()) {
            forceRedirectToCore('travel_inactive');
            return;
        }
    } catch (e) { /* ignore */ }
})();

function compareVersion(a, b) {
    var aa = String(a || '').split('.');
    var bb = String(b || '').split('.');
    var n = Math.max(aa.length, bb.length);
    for (var i = 0; i < n; i++) {
        var x = parseInt(aa[i] || '0', 10);
        var y = parseInt(bb[i] || '0', 10);
        if (x > y) return 1;
        if (x < y) return -1;
    }
    return 0;
}

function setMaintenanceOverlay(on, message, forceReload) {
    var ov = document.getElementById('maintenance-overlay');
    var msg = document.getElementById('maintenance-message');
    var btn = document.getElementById('maintenance-reload');
    if (!ov || !msg || !btn) return;
    GLB_MAINTENANCE_ON = !!on;
    msg.textContent = message || MAINTENANCE_DEFAULT;
    btn.style.display = forceReload ? '' : 'none';
    ov.hidden = !on;
    ov.setAttribute('aria-hidden', on ? 'false' : 'true');
    ov.style.display = on ? 'flex' : 'none';
    if (on) ov.classList.add('show');
    else ov.classList.remove('show');
}

function applySystemStatus(status) {
    if (!status) return;
    var forceReload = status.min_app_version && compareVersion(status.min_app_version, APP_VERSION) > 0;
    if (forceReload) {
        setMaintenanceOverlay(true, 'A new version is available. Please reload the page.', true);
        return;
    }
    if (status.maintenance_mode) {
        setMaintenanceOverlay(true, status.maintenance_message || MAINTENANCE_DEFAULT, false);
        return;
    }
    setMaintenanceOverlay(false, '', false);
}

function fetchSystemStatus(force) {
    var now = Date.now();
    if (!force && GLB_SYSTEM_STATUS_CACHE && (now - GLB_SYSTEM_STATUS_AT < GLB_SYSTEM_STATUS_TTL)) {
        applySystemStatus(GLB_SYSTEM_STATUS_CACHE);
        return Promise.resolve(GLB_SYSTEM_STATUS_CACHE);
    }
    return fetch(NEXTBASE_APP_ORIGIN + '/system-status', { method: 'GET', cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (j) {
            GLB_SYSTEM_STATUS_CACHE = j;
            GLB_SYSTEM_STATUS_AT = Date.now();
            applySystemStatus(j);
            return j;
        })
        .catch(function () {
            try { setMaintenanceOverlay(false, '', false); } catch (e0) { /* ignore */ }
            return GLB_SYSTEM_STATUS_CACHE;
        });
}

(function initSystemStatusWatcher() {
    var reloadBtn = document.getElementById('maintenance-reload');
    if (reloadBtn) reloadBtn.addEventListener('click', function () { location.reload(); });
    fetchSystemStatus(true);
    setInterval(function () { fetchSystemStatus(false); }, 30000);
    window.addEventListener('pageshow', function () { fetchSystemStatus(true); });
})();

function cleanupUrlParams() {
    try {
        var url = new URL(window.location.href);
        url.searchParams.delete('travel');
        url.searchParams.delete('session_id');
        url.searchParams.delete('subscribed');
        history.replaceState({}, '', url.pathname + url.search + url.hash);
    } catch (e) { /* ignore */ }
}

function showTravelStatus(message) {
    var el = document.getElementById('travel-status');
    if (!el) return;
    if (!message) {
        el.style.display = 'none';
        el.textContent = '';
        return;
    }
    el.textContent = message;
    el.style.display = '';
}

function updateEntitlementState(data) {
    if (data && data.ok) {
        GLB_CORE_SUBSCRIBED = !!data.core_subscribed || glbCorePaidActive();
        GLB_TRAVEL_ACTIVE = !!data.travel_active;
        GLB_TRAVEL_EXPIRES_AT = data.travel_pass_expires_at ? String(data.travel_pass_expires_at) : null;
    }
    if (typeof refreshTravelRemainingLine === 'function') refreshTravelRemainingLine();
    if (typeof updateQuota === 'function') updateQuota();
}

function applySafeFallbackUi() {
    GLB_CORE_SUBSCRIBED = false;
    GLB_TRAVEL_ACTIVE = false;
    GLB_TRAVEL_EXPIRES_AT = null;
    if (typeof refreshTravelRemainingLine === 'function') refreshTravelRemainingLine();
    if (typeof updateQuota === 'function') updateQuota();
}

function refreshTravelRemainingLine() {
    var el = document.getElementById('travel-remaining-line');
    var expDisp = document.getElementById('travel-expiry-display');
    if (!el) return;
    if (!GLB_TRAVEL_ACTIVE || !GLB_TRAVEL_EXPIRES_AT) {
        el.style.display = 'none';
        el.textContent = '';
        if (expDisp) { expDisp.style.display = 'none'; expDisp.textContent = ''; }
        return;
    }
    var exp = new Date(GLB_TRAVEL_EXPIRES_AT);
    if (isNaN(exp.getTime())) {
        el.style.display = 'none';
        if (expDisp) { expDisp.style.display = 'none'; expDisp.textContent = ''; }
        return;
    }
    var msLeft = exp.getTime() - Date.now();
    var days = Math.max(0, Math.ceil(msLeft / (24 * 60 * 60 * 1000)));
    var loc = (CURRENT_LANG === 'ja') ? 'ja-JP' : (CURRENT_LANG === 'zh' ? 'zh-CN' : 'en-US');
    var dateStr = exp.toLocaleDateString(loc, { year: 'numeric', month: 'short', day: 'numeric' });
    el.textContent = T('travelDaysLeft').replace(/\{\{n\}\}/g, String(days)).replace(/\{\{date\}\}/g, dateStr);
    el.style.display = '';
    if (expDisp) {
        expDisp.style.display = '';
        expDisp.textContent = T('travelExpiresOn').replace(/\{\{date\}\}/g, dateStr);
    }
}

async function syncEntitlements() {
    var url = new URL(window.location.href);
    var sessionId = (url.searchParams.get('session_id') || '').trim();
    var customerId = (localStorage.getItem(LS_CUSTOMER_ID) || '').trim();
    var pendingSessionId = (localStorage.getItem(LS_PENDING_SESSION_ID) || '').trim();
    var apiUrl = '';
    if (sessionId) {
        try { localStorage.setItem(LS_PENDING_SESSION_ID, sessionId); } catch (e) { /* ignore */ }
    }
    if (customerId) {
        apiUrl = NEXTBASE_APP_ORIGIN + '/entitlements?customer_id=' + encodeURIComponent(customerId);
    } else if (sessionId) {
        apiUrl = NEXTBASE_APP_ORIGIN + '/entitlements?session_id=' + encodeURIComponent(sessionId);
    } else if (pendingSessionId) {
        apiUrl = NEXTBASE_APP_ORIGIN + '/entitlements?session_id=' + encodeURIComponent(pendingSessionId);
    } else {
        return null;
    }
    var data;
    try {
        var res = await fetch(apiUrl, { cache: 'no-store' });
        data = await res.json();
    } catch (err) {
        return null;
    }
    if (data && data.ok) {
        if (data.customer_id) {
            localStorage.setItem(LS_CUSTOMER_ID, data.customer_id);
            try { localStorage.removeItem(LS_PENDING_SESSION_ID); } catch (e) { /* ignore */ }
        }
        if (data.core_subscribed && data.travel_active) {
            var expMs = 0;
            try { expMs = data.travel_pass_expires_at ? Date.parse(String(data.travel_pass_expires_at)) : 0; } catch (e0) { expMs = 0; }
            if (expMs && isFinite(expMs)) {
                persistBillingState({
                    plan: PLAN_TRAVEL_1499_30D,
                    active: true,
                    source: 'entitlements_api',
                    travelPass: {
                        enabled: true,
                        startedAt: expMs - MS_30D,
                        expiresAt: expMs,
                        expired: false,
                        timeSource: 'entitlements_api'
                    }
                });
            } else {
                persistBillingState({ plan: PLAN_TRAVEL_1499_30D, active: true, source: 'entitlements_api', updatedAt: Date.now() });
            }
        } else if (data.core_subscribed) {
            persistBillingState({ plan: PLAN_CORE_299, active: true, source: 'entitlements_api', updatedAt: Date.now() });
        } else {
            var st = parseBillingState();
            var holdCheckout = st && st.active && (st.source === 'stripe_success' || st.source === 'url_subscribed');
            if (holdCheckout) {
                persistBillingState({ plan: st.plan || PLAN_CORE_299, active: true, source: st.source, updatedAt: Date.now(), travelPass: st.travelPass });
            } else if (st && st.active && st.source === 'migration_legacy' && !(data.customer_id && data.ok)) {
                persistBillingState({ plan: st.plan || PLAN_CORE_299, active: true, source: 'migration_legacy', updatedAt: Date.now(), travelPass: st.travelPass });
            } else {
                persistBillingState({ plan: null, active: false, source: 'entitlements_api', updatedAt: Date.now() });
            }
        }
        updateEntitlementState(data);
    }
    return data;
}

async function syncEntitlementsWithCheckoutRetry() {
    var loc = new URL(window.location.href);
    var hasSessionInUrl = !!(loc.searchParams.get('session_id') || '').trim();
    var maxTry = 5;
    var delayMs = 1200;
    var last = null;
    for (var i = 0; i < maxTry; i++) {
        try { last = await syncEntitlements(); } catch (e) { last = null; }
        if (last && last.ok && (last.core_subscribed || last.travel_active)) {
            return last;
        }
        if (!hasSessionInUrl) return last;
        if (i < maxTry - 1) {
            await new Promise(function (r) { setTimeout(r, delayMs); });
        }
    }
    return last;
}

async function handleTravelActivationFlow() {
    var url = new URL(window.location.href);
    var isTravelRedirect = url.searchParams.get('travel') === '1';
    var isCoreRedirect = url.searchParams.get('subscribed') === '1';
    var hasSessionId = !!(url.searchParams.get('session_id') || '').trim();
    if (hasSessionId) {
        try { localStorage.setItem(LS_PENDING_SESSION_ID, (url.searchParams.get('session_id') || '').trim()); } catch (e) { /* ignore */ }
    }
    if (!isTravelRedirect && !isCoreRedirect) {
        try {
            var ent0 = await syncEntitlements();
            if (ent0 === null && (localStorage.getItem(LS_CUSTOMER_ID) || '').trim()) {
                applySafeFallbackUi();
            }
        } catch (e) {
            applySafeFallbackUi();
        }
        return;
    }
    localStorage.setItem(LS_TRAVEL_PENDING, 'true');
    showTravelStatus(isCoreRedirect ? 'Activating Core Access...' : 'Activating Travel Pass...');
    var timeoutId = setTimeout(function () {
        if (localStorage.getItem(LS_TRAVEL_PENDING) === 'true') {
            localStorage.removeItem(LS_TRAVEL_PENDING);
            showTravelStatus(isCoreRedirect ? 'Core access activation is taking longer than expected.' : 'Travel pass activation is taking longer than expected.');
            cleanupUrlParams();
        }
    }, 60000);
    try {
        var ent = await syncEntitlementsWithCheckoutRetry();
        if (ent && ent.ok && isCoreRedirect && ent.core_subscribed) {
            localStorage.removeItem(LS_TRAVEL_PENDING);
            showTravelStatus('Core Access Active');
            cleanupUrlParams();
        } else if (ent && ent.ok && ent.travel_active) {
            localStorage.removeItem(LS_TRAVEL_PENDING);
            showTravelStatus('Travel Pass Active');
            cleanupUrlParams();
        }
    } catch (e) {
        applySafeFallbackUi();
    } finally {
        clearTimeout(timeoutId);
        if ((localStorage.getItem(LS_CUSTOMER_ID) || '').trim()) {
            cleanupUrlParams();
        }
    }
}

const LS_QUOTA = 'glb_travel_demo_quota_v1';
const FREE_LIMIT = 5;

const LANGS = [
  {c:'en',l:'English'},{c:'ja',l:'日本語'},{c:'zh',l:'中文'},
  {c:'ko',l:'한국어'},{c:'es',l:'Español'},{c:'fr',l:'Français'},
  {c:'de',l:'Deutsch'},{c:'it',l:'Italiano'},{c:'ru',l:'Русский'},
  {c:'th',l:'ไทย'},{c:'vi',l:'Tiếng Việt'},{c:'hi',l:'हिन्दी'},{c:'pt',l:'Português'}
];

const ESSENTIALS = [
  { en: 'Where is the toilet?', key: 'toilet' },
  { en: 'How much is this?', key: 'price' },
  { en: 'I need a doctor.', key: 'doctor' },
  { en: 'Please call the police.', key: 'police' },
  { en: 'Do you speak English?', key: 'english' },
  { en: 'Thank you very much.', key: 'thanks' },
  { en: 'I don\'t understand.', key: 'understand' },
  { en: 'Please help me.', key: 'help' },
  { en: 'Where is the hotel?', key: 'hotel' },
  { en: 'I am allergic to...', key: 'allergy' },
  { en: 'That was absolutely delicious!', key: 'delicious' },
  { en: 'This place is beautiful.', key: 'beautiful' },
  { en: 'You have been very kind. Thank you.', key: 'kind_thanks' },
  { en: 'Can you recommend something local?', key: 'recommend_local' },
  { en: 'Is tipping customary here?', key: 'tipping_customary' },
  { en: 'Tipping is not expected here.', key: 'tipping_not_expected' },
  { en: 'Rounding up the bill is enough.', key: 'rounding_up' },
  { en: 'A small cash tip is appreciated.', key: 'small_cash_tip' },
];

var currentMode = null;
var isFlipped = false;
var isRecording = false;
var recognition = null;
var essentialCache = {};

function glbTodayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
}

function getQuota() {
    if (isTravelUiUnlimited()) return { day: glbTodayKey(), count: 0 };
    try {
        var today = glbTodayKey();
        var raw = localStorage.getItem(LS_QUOTA);
        if (!raw) return { day: today, count: 0 };
        var j = JSON.parse(raw);
        return j.day !== today ? { day: today, count: 0 } : j;
    } catch(e) { return { day:'', count:0 }; }
}

function bumpQuota() {
    if (isTravelUiUnlimited()) return;
    try {
        var q = getQuota();
        q.count = (q.count||0) + 1;
        localStorage.setItem(LS_QUOTA, JSON.stringify(q));
    } catch(e) {}
}

function updateQuota() {
    var el = document.getElementById('glb-quota');
    if (!el) return;
    if (isTravelUiUnlimited()) {
        el.textContent = 'Travel Pass active — unlimited translations';
        return;
    }
    var q = getQuota();
    var left = Math.max(0, FREE_LIMIT - q.count);
    el.textContent = left > 0
        ? (left + ' free translation' + (left !== 1 ? 's' : '') + ' remaining today (demo cap)')
        : 'Demo limit reached';
}

function fillSelect(sel) {
    sel.innerHTML = '';
    LANGS.forEach(function (l) {
        var o = document.createElement('option');
        o.value = l.c; o.textContent = l.l;
        sel.appendChild(o);
    });
}

function initLang() {
    var from = document.getElementById('t-from');
    var to = document.getElementById('t-to');
    fillSelect(from); fillSelect(to);
    const USER_LANG = localStorage.getItem('glb_ui_lang') || 'en';
    from.value = USER_LANG;
    to.value = USER_LANG === 'en' ? 'ja' : 'en';
    document.getElementById('t-swap').addEventListener('click', function () {
        var tmp = from.value;
        from.value = to.value;
        to.value = tmp;
        essentialCache = {};
        if (currentMode === 'essentials') renderEssentials();
    });
    to.addEventListener('change', function () {
        essentialCache = {};
        if (currentMode === 'essentials') renderEssentials();
    });
}

function setMode(mode) {
    currentMode = mode;
    ['speak','show','essentials'].forEach(function (m) {
        document.getElementById('btn-' + m).classList.toggle('active', m === mode);
        document.getElementById('panel-' + m).classList.toggle('visible', m === mode);
    });
    if (mode === 'essentials') renderEssentials();
    if (mode === 'show') {
        setTimeout(function () { document.getElementById('show-input').focus(); }, 100);
    }
}

document.getElementById('flip-btn').addEventListener('click', function () {
    isFlipped = !isFlipped;
    var r = document.getElementById('glb-result');
    r.classList.toggle('flipped', isFlipped);
    document.getElementById('flip-btn').textContent = isFlipped ? 'Unflip' : 'Flip';
});

function setResult(text, isIdle) {
    var el = document.getElementById('glb-result');
    el.textContent = text || 'Ready to help';
    el.classList.toggle('idle', !!isIdle);
}

async function translate(text, from, to) {
    if (GLB_MAINTENANCE_ON) return null;
    if (!isTravelUiUnlimited()) {
        var q = getQuota();
        if (q.count >= FREE_LIMIT) {
            setResult('Today\'s free limit reached.');
            return null;
        }
    }
    try {
        setResult('Translating...');
        var r = await fetch(NEXTBASE_APP + '/translate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(glbTranslatePayloadTravel(text, from, to, 'travel')),
            cache: 'no-store'
        });
        if (r.status === 429) {
            setResult('Cloud daily limit reached. Subscribe to GLB for unlimited translation.', true);
            return null;
        }
        var raw = await r.text();
        var out = raw;
        try { var j = JSON.parse(raw); out = j.translatedText || raw; } catch(e) {}
        setResult(out);
        bumpQuota();
        updateQuota();
        return out;
    } catch(e) {
        setResult('Connection issue. Please try again.', true);
        return null;
    }
}

async function runTranslate() {
    if (GLB_MAINTENANCE_ON) return;
    var text = document.getElementById('show-input').value.trim();
    if (!text) return;
    var from = document.getElementById('t-from').value;
    var to = document.getElementById('t-to').value;
    if (from === to) { setResult(text); return; }
    await translate(text, from, to);
}

document.getElementById('show-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') runTranslate();
});

function toggleMic() {
    if (GLB_MAINTENANCE_ON) return;
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        setResult('Voice input is not available in this browser.', true);
        return;
    }
    if (isRecording) { stopMic(); return; }
    startMic();
}

function startMic() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    var from = document.getElementById('t-from').value;
    recognition.lang = from;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onresult = async function (e) {
        var spoken = e.results[0][0].transcript;
        var to = document.getElementById('t-to').value;
        await translate(spoken, from, to);
        stopMic();
    };
    recognition.onerror = function () {
        setResult('I could not hear clearly. Please try again.', true);
        stopMic();
    };
    recognition.onend = function () { stopMic(); };
    recognition.start();
    isRecording = true;
    var btn = document.getElementById('mic-btn');
    btn.classList.add('recording');
    btn.textContent = '⏹ Listening…';
    setResult('Listening…', true);
}

function stopMic() {
    if (recognition) { try { recognition.stop(); } catch(e) {} }
    isRecording = false;
    var btn = document.getElementById('mic-btn');
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 &nbsp; Tap to start conversation';
}

async function renderEssentials() {
    if (GLB_MAINTENANCE_ON) return;
    var container = document.getElementById('glb-cards');
    var to = document.getElementById('t-to').value;
    container.innerHTML = '';

    ESSENTIALS.forEach(function (phrase) {
        var card = document.createElement('div');
        card.className = 'glb-card';

        var enLine = document.createElement('div');
        enLine.className = 'glb-card-en';
        enLine.textContent = phrase.en;

        var transLine = document.createElement('div');
        transLine.className = 'glb-card-translated';

        var cacheKey = phrase.key + '_' + to;
        if (essentialCache[cacheKey]) {
            transLine.textContent = essentialCache[cacheKey];
        } else {
            transLine.textContent = '…';
            (async function () {
                if (!isTravelUiUnlimited()) {
                    var q = getQuota();
                    if (q.count >= FREE_LIMIT) { transLine.textContent = phrase.en; return; }
                }
                try {
                    var r = await fetch(NEXTBASE_APP + '/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(glbTranslatePayloadTravel(phrase.en, 'en', to, 'essentials')),
                        cache: 'no-store'
                    });
                    if (r.status === 429) {
                        transLine.textContent = phrase.en;
                        return;
                    }
                    var raw = await r.text();
                    var out = raw;
                    try { var j = JSON.parse(raw); out = j.translatedText || raw; } catch(e) {}
                    essentialCache[cacheKey] = out;
                    transLine.textContent = out;
                    bumpQuota();
                    updateQuota();
                } catch(e) { transLine.textContent = phrase.en; }
            })();
        }

        card.appendChild(enLine);
        card.appendChild(transLine);
        card.addEventListener('click', function () {
            setResult(transLine.textContent);
        });
        container.appendChild(card);
    });
}

document.getElementById('btn-speak').addEventListener('click', function () { setMode('speak'); });
document.getElementById('btn-show').addEventListener('click', function () { setMode('show'); });
document.getElementById('btn-essentials').addEventListener('click', function () { setMode('essentials'); });
document.getElementById('mic-btn').addEventListener('click', toggleMic);
document.getElementById('t-btn').addEventListener('click', runTranslate);
initLang();
setMode('speak');
updateQuota();
refreshTravelRemainingLine();
handleTravelActivationFlow();


</script>
